<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuracion base del sitio -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mision Sonic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Pantalla de carga fullscreen -->
  <section class="loader-screen" id="loaderScreen" aria-label="Pantalla de carga">
    <img class="loader-logo" src="assets/logo-sonic.png" alt="Logo de Sonic">
    <p class="loader-text">Cargando misi&oacute;n...</p>

    <!-- Anillos animados secuencialmente con CSS -->
    <div class="rings-loader" aria-hidden="true">
      <img class="loader-ring" src="assets/anillo.png" alt="">
      <img class="loader-ring" src="assets/anillo.png" alt="">
      <img class="loader-ring" src="assets/anillo.png" alt="">
      <img class="loader-ring" src="assets/anillo.png" alt="">
      <img class="loader-ring" src="assets/anillo.png" alt="">
    </div>
  </section>

  <!-- Pantalla de introduccion del Sprint 2 -->
  <main class="intro-screen is-hidden" id="introScreen">
    <img class="intro-sonic" id="introSonic" src="assets/sonic.png" alt="Sonic listo para la mision">
    <h1 class="intro-message">Eggman rob&oacute; todos los anillos. &iquest;Me ayud&aacute;s a recuperarlos?</h1>
    <button class="start-button" id="startButton" type="button">&iexcl;Vamos!</button>
  </main>

  <!-- Escenario preparado para el comienzo del juego -->
 <section class="green-hill-screen is-hidden" id="greenHillScreen" aria-label="Escenario Green Hill">

  <!-- Interfaz de progreso -->
  <div class="mission-progress" id="missionProgress">
    <span>💍 <strong id="ringCount">0</strong> / 15</span>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Objetivo de la misión -->
  <div class="mission-objective" id="missionObjective">
    <p class="mission-label">🎯 MISIÓN</p>
    <h2>¡Ayudá a Sonic!</h2>
    <p>Recuperá los 15 anillos.</p>
  </div>

  <!-- Cuenta regresiva -->
  <div class="countdown" id="countdown" aria-live="assertive"></div>

  <!-- Anillo del juego -->
  <button class="game-ring is-hidden" id="gameRing" type="button" aria-label="Atrapar anillo">
    <img src="assets/anillo.png" alt="">
  </button>

  <img
    class="green-hill-sonic"
    id="greenHillSonic"
    src="assets/sonic.png"
    alt="Sonic en Green Hill"
  >
</section>

  <!-- Audios de interaccion y musica de fondo -->
  <audio id="playSound" src="assets/play.mp3" data-fallback-src="assets/enter.mp3" preload="auto"></audio>
  <audio id="backgroundMusic" src="assets/8bits.mp3" preload="auto" loop></audio>
  <audio id="coinSound" src="assets/coin.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
